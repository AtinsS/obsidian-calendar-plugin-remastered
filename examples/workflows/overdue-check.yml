name: Overdue Task Check

on:
  schedule:
    # каждые 30 мин
    - cron: '0,30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check overdue and deadlines
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || 'Calendar_Remastered' }}
        run: |
          TASKS_FILE="calendar-data/tasks.json"
          NOTIF_FILE="calendar-data/notifications.json"

          if [ ! -f "$TASKS_FILE" ]; then
            echo "No tasks file found at $TASKS_FILE, skipping"
            exit 0
          fi

          python3 -c "
          import json, os, subprocess, sys
          from datetime import datetime, timedelta, timezone

          tasks_file = '$TASKS_FILE'
          notif_file = '$NOTIF_FILE'

          with open(tasks_file) as f:
              tasks_data = json.load(f)

          notif_data = {}
          if os.path.exists(notif_file):
              with open(notif_file) as f:
                  notif_data = json.load(f)

          ns = notif_data
          if not ns.get('overdueCheckEnabled'):
              print('Overdue check disabled in settings, skipping')
              sys.exit(0)

          topic = ns.get('ntfyTopic') or os.environ.get('NTFY_TOPIC', 'Calendar_Remastered')
          tasks = tasks_data.get('tasks', [])

          msk = timezone(timedelta(hours=3))
          now = datetime.now(msk)
          today = now.strftime('%Y-%m-%d')
          now_str = now.strftime('%H:%M')
          tomorrow = (now + timedelta(days=1)).strftime('%Y-%m-%d')

          last_check = ns.get('lastOverdueCheck', '')
          today_checks = ns.get('overdueChecksToday', [])
          if not last_check.startswith(today):
              today_checks = []

          notifications = []

          for t in tasks:
              status = t.get('status', '')
              completed = t.get('completed', False)

              if status == 'done' or completed:
                  continue

              title = t.get('title', 'Задача')
              tid = t.get('id', title)
              sched = t.get('scheduledTime', '')
              date_uid = t.get('dateUID', '')

              check_key = f'overdue:{tid}'
              if sched and today in date_uid:
                  if sched <= now_str and status == 'todo' and check_key not in today_checks:
                      notifications.append(f'Просрочено: {title} (было в {sched})')
                      today_checks.append(check_key)

              deadline = t.get('deadline', '')
              deadline_time = t.get('deadlineTime', '')
              dl_key = f'dl-today:{tid}'
              if deadline and today in deadline:
                  if deadline_time and deadline_time <= now_str and dl_key not in today_checks:
                      notifications.append(f'Дедлайн истёк: {title} ({deadline_time})')
                      today_checks.append(dl_key)
                  elif not deadline_time and dl_key not in today_checks:
                      notifications.append(f'Дедлайн сегодня: {title}')
                      today_checks.append(dl_key)

              dl_tomorrow_key = f'dl-tomorrow:{tid}'
              if deadline and tomorrow in deadline:
                  if dl_tomorrow_key not in today_checks:
                      time_part = f' в {deadline_time}' if deadline_time else ''
                      notifications.append(f'Дедлайн завтра: {title}{time_part}')
                      today_checks.append(dl_tomorrow_key)

              est_key = f'est:{tid}'
              est = t.get('estimatedTime', 0)
              work = t.get('totalWorkTime', 0)
              if est > 0 and work > 0 and status == 'progress':
                  if work > est * 60 * 1000 and est_key not in today_checks:
                      notifications.append(f'Превышен лимит: {title} (заявлено {est}м)')
                      today_checks.append(est_key)

          if notifications:
              msg = '\n'.join(notifications)
              print(msg)
              subprocess.run([
                  'curl', '-s', '-d', msg,
                  '-H', 'Title: Calendar Remastered',
                  '-H', 'Priority: high',
                  '-H', 'Tags: warning',
                  f'https://ntfy.sh/{topic}'
              ])
          else:
              print('No overdue tasks')

          ns['lastOverdueCheck'] = now.strftime('%Y-%m-%dT%H:%M')
          ns['overdueChecksToday'] = today_checks[-100:]
          with open(notif_file, 'w') as f:
              json.dump(notif_data, f, indent=2)
          "

      - name: Commit updated notifications
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add calendar-data/notifications.json
          git diff --staged --quiet || git commit -m "Update dedup state after overdue check"
          git push
