name: Daily Task Summary

on:
  schedule:
    # каждые 5 мин с 3:00 до 16:00 UTC (6:00-19:00 MSK)
    - cron: '*/5 3-16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send morning summary
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || 'Calendar_Remastered' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ ! -f "calendar-data.json" ]; then
            echo "::error::calendar-data.json not found in repo root"
            echo "Make sure:"
            echo "  1. syncToVault is enabled in plugin settings"
            echo "  2. The file is committed: git add calendar-data.json && git commit"
            echo "  3. The file is pushed to the main branch"
            TOPIC="${NTFY_TOPIC:-Calendar_Remastered}"
            curl -s -d "Утренняя сводка не отправлена: calendar-data.json не найден. Включите syncToVault в настройках плагина и закоммьте файл." \
              -H "Title: Calendar Remastered — Ошибка" \
              -H "Priority: min" \
              -H "Tags: warning" \
              "https://ntfy.sh/${TOPIC}" || true
            exit 0
          fi

          python3 << 'PYTHON_SCRIPT'
          import json, os, subprocess, sys
          from datetime import datetime, timedelta, timezone

          try:
              with open('calendar-data.json') as f:
                  data = json.load(f)
          except json.JSONDecodeError as e:
              print(f"::error::Failed to parse calendar-data.json: {e}")
              sys.exit(1)
          except FileNotFoundError:
              print("::warning::calendar-data.json not found")
              sys.exit(0)

          ns = data.get('notificationSync', {})
          if not ns.get('morningSummaryEnabled'):
              print('Morning summary disabled in settings, skipping')
              sys.exit(0)

          msk = timezone(timedelta(hours=3))
          now = datetime.now(msk)
          today_prefix = now.strftime('%Y-%m-%d')

          summary_time_str = ns.get('morningSummaryTime', '06:00')
          try:
              target_h, target_m = map(int, summary_time_str.split(':'))
          except (ValueError, AttributeError):
              target_h, target_m = 6, 0

          event_name = os.environ.get('EVENT_NAME', 'schedule')
          if event_name == 'schedule':
              # Compare minutes with wrap-around handling (e.g. target 05:58, now 06:02)
              # Use 15-minute window to account for GitHub Actions scheduling delays
              now_minutes = now.hour * 60 + now.minute
              target_minutes = target_h * 60 + target_m
              minute_diff = now_minutes - target_minutes
              # Allow sending if within 15 minutes AFTER the target time
              # (before target or more than 15 min late = skip)
              if minute_diff < 0 or minute_diff > 15:
                  print(f'Not within sending window (target {summary_time_str}, now {now.strftime("%H:%M")}, diff={minute_diff}m), skipping')
                  sys.exit(0)

          last_sent = ns.get('lastSummarySent', '')
          if last_sent.startswith(today_prefix):
              print(f'Already sent today ({last_sent}), skipping')
              sys.exit(0)

          topic = ns.get('ntfyTopic') or os.environ.get('NTFY_TOPIC', 'Calendar_Remastered')
          tasks = data.get('taskTracker', {}).get('tasks', [])
          projects = data.get('taskTracker', {}).get('projects', [])

          today_str = now.strftime('%Y-%m-%d')
          yesterday = now - timedelta(days=1)
          yesterday_str = yesterday.strftime('%Y-%m-%d')

          overdue = []
          morning = []
          afternoon = []
          evening = []
          done_today = 0
          done_yesterday = 0

          def get_project_name(pid):
              for p in projects:
                  if p['id'] == pid:
                      return f" [{p['name']}]"
              return ''

          for t in tasks:
              status = t.get('status', '')
              completed = t.get('completed', False)
              date_uid = t.get('dateUID', '')

              if status == 'done' or completed:
                  if today_str in date_uid:
                      done_today += 1
                  elif yesterday_str in date_uid:
                      done_yesterday += 1
                  continue

              if today_str not in date_uid:
                  sched_date = date_uid.replace('day-', '') if 'day-' in date_uid else ''
                  if sched_date and sched_date < today_str:
                      overdue.append(t)
                  if t.get('deadline'):
                      dl = t['deadline']
                      if 'day-' in dl:
                          dl_date = dl.replace('day-', '')
                          if dl_date < today_str:
                              overdue.append(t)
                  continue

              sched = t.get('scheduledTime', '')
              proj = get_project_name(t.get('projectId', ''))
              title = t.get('title', 'Без названия')
              hour = int(sched.split(':')[0]) if sched and ':' in sched else 12

              timer_info = ''
              if status == 'progress' and t.get('timerStartedAt'):
                  elapsed = (now.timestamp() * 1000 - t['timerStartedAt']) / 1000
                  if elapsed > 0:
                      hours = int(elapsed // 3600)
                      minutes = int((elapsed % 3600) // 60)
                      if hours > 0:
                          timer_info = f" [в работе {hours}ч {minutes}м]"
                      else:
                          timer_info = f" [в работе {minutes}м]"

              entry = {'title': title, 'project': proj, 'time': sched or '--:--', 'hour': hour, 'timer': timer_info}

              if hour < 12:
                  morning.append(entry)
              elif hour < 17:
                  afternoon.append(entry)
              else:
                  evening.append(entry)

          seen_ids = set()
          unique_overdue = []
          for t in overdue:
              tid = t.get('id', t.get('title', ''))
              if tid not in seen_ids:
                  seen_ids.add(tid)
                  unique_overdue.append(t)

          total = len(unique_overdue) + len(morning) + len(afternoon) + len(evening)

          lines = [f'Задачи на сегодня ({total})', '']

          if unique_overdue:
              lines.append(f'Просроченные ({len(unique_overdue)}):')
              for i, t in enumerate(unique_overdue, 1):
                  proj = get_project_name(t.get('projectId', ''))
                  sched = t.get('scheduledTime', '--:--')
                  lines.append(f'{i}. {t["title"]}{proj} {sched}')
              lines.append('')

          if morning:
              lines.append(f'Утро ({len(morning)}):')
              for i, e in enumerate(morning, len(unique_overdue) + 1):
                  lines.append(f'{i}. {e["title"]}{e["project"]} {e["time"]}{e["timer"]}')
              lines.append('')

          if afternoon:
              lines.append(f'День ({len(afternoon)}):')
              for i, e in enumerate(afternoon, len(unique_overdue) + len(morning) + 1):
                  lines.append(f'{i}. {e["title"]}{e["project"]} {e["time"]}{e["timer"]}')
              lines.append('')

          if evening:
              lines.append(f'Вечер ({len(evening)}):')
              for i, e in enumerate(evening, len(unique_overdue) + len(morning) + len(afternoon) + 1):
                  lines.append(f'{i}. {e["title"]}{e["project"]} {e["time"]}{e["timer"]}')
              lines.append('')

          lines.append('Статистика:')
          lines.append(f'Вчера выполнено: {done_yesterday}')
          lines.append(f'Сегодня осталось: {total}')

          if total == 0:
              lines = ['Задач на сегодня нет', '', 'Отдыхай!']

          msg = '\n'.join(lines)
          print(msg)

          # Send with retry (ntfy.sh can be temporarily unavailable)
          send_ok = False
          for attempt in range(3):
              result = subprocess.run([
                  'curl', '-s', '--retry', '2', '--retry-delay', '5',
                  '-d', msg,
                  '-H', 'Title: Задачи на сегодня',
                  '-H', 'Priority: high',
                  '-H', 'Tags: calendar,clipboard',
                  f'https://ntfy.sh/{topic}'
              ], capture_output=True, text=True, timeout=30)

              if result.returncode == 0:
                  send_ok = True
                  break
              print(f'Attempt {attempt + 1} failed, retrying...')
              import time
              time.sleep(5)

          if not send_ok:
              print(f"::error::Failed to send notification after 3 attempts: {result.stderr}")
              sys.exit(1)

          ns['lastSummarySent'] = now.strftime('%Y-%m-%dT%H:%M')
          with open('calendar-data.json', 'w') as f:
              json.dump(data, f, indent=2)

          print("Notification sent successfully")
          PYTHON_SCRIPT

      - name: Commit updated calendar-data.json
        if: success()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add calendar-data.json
          git diff --staged --quiet || git commit -m "Update lastSummarySent after morning summary"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push
